name: Täglicher Deep-Dive

on:
  schedule:
    # 05:00 UTC an Werktagen (Mo–Fr) ≈ 06:00/07:00 in DE. Cron ist immer UTC.
    - cron: "0 5 * * 1-5"
  workflow_dispatch: # Manueller Start im Actions-Tab
    inputs:
      day:
        description: "Optional: bestimmten Tag (1–60) erzwingen — leer lassen = aus Datum"
        required: false
        default: ""

permissions:
  contents: write # nötig, um das Ergebnis ins Repo zu committen

concurrency:
  group: daily-deepdive
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm install --no-audit --no-fund

      - name: Deep-Dive erzeugen
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FORCE_DAY: ${{ inputs.day }}
        run: |
          if [ -n "$FORCE_DAY" ]; then
            echo "Erzwinge Tag $FORCE_DAY"
            node scripts/generate.mjs --day="$FORCE_DAY"
          else
            node scripts/generate.mjs
          fi

      - name: Ergebnis committen
        run: |
          git config user.name "denken-bot"
          git config user.email "denken-bot@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "Nichts Neues — kein Commit."
          else
            git commit -m "Deep-Dive: $(date -u +%Y-%m-%d)"
            git push
          fi
